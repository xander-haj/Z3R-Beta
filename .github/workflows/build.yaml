name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev zip wget
      - name: Build
        env:
          CFLAGS: "-O2"
        run: make -j$(nproc) zelda3
      - name: Package
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps dist
          cp zelda3 AppDir/usr/bin/

          cat > AppDir/AppRun <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          if [ -n "${APPIMAGE:-}" ]; then
            cd "$(dirname "$APPIMAGE")"
          fi

          export LD_LIBRARY_PATH="$APPDIR/usr/lib:$APPDIR/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
          exec "$APPDIR/usr/bin/zelda3" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/usr/share/applications/zelda3.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Zelda 3 Reborn
          Exec=zelda3
          Icon=zelda3
          Categories=Game;
          Terminal=false
          EOF
          cp AppDir/usr/share/applications/zelda3.desktop AppDir/zelda3.desktop

          cat > AppDir/usr/share/icons/hicolor/scalable/apps/zelda3.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
            <rect width="128" height="128" rx="18" fill="#1f5f38"/>
            <path fill="#f4d35e" d="M64 18 16 104h96L64 18Zm0 25 25 45H39l25-45Z"/>
            <path fill="#f4d35e" d="M64 74 47 104h34L64 74Z"/>
          </svg>
          EOF
          cp AppDir/usr/share/icons/hicolor/scalable/apps/zelda3.svg AppDir/zelda3.svg

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appimage-extract
          ./squashfs-root/AppRun --appdir AppDir --executable AppDir/usr/bin/zelda3 --desktop-file AppDir/zelda3.desktop --icon-file AppDir/zelda3.svg --custom-apprun=AppDir/AppRun --output appimage

          mv Zelda_3_Reborn-*.AppImage dist/Zelda-3-Reborn-${{ github.ref_name }}-linux-x64.AppImage
          chmod +x dist/Zelda-3-Reborn-${{ github.ref_name }}-linux-x64.AppImage
          cp zelda3.ini readme.md LICENSE.txt dist/
          cd dist && zip -r ../zelda3-${{ github.ref_name }}-linux-x64.zip .
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: zelda3-${{ github.ref_name }}-linux-x64.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: brew install sdl2 dylibbundler
      - name: Build
        run: make -j$(sysctl -n hw.ncpu) zelda3
      - name: Package
        run: |
          APP_NAME="Zelda 3 Reborn.app"
          mkdir -p "dist/$APP_NAME/Contents/MacOS" "dist/$APP_NAME/Contents/Resources" "dist/$APP_NAME/Contents/Frameworks"
          cp zelda3 "dist/$APP_NAME/Contents/MacOS/zelda3-bin"

          cat > "dist/$APP_NAME/Contents/MacOS/Zelda 3 Reborn" <<'EOF'
          #!/bin/sh
          APP_DIR="$(cd "$(dirname "$0")/../../.." && pwd)"
          cd "$APP_DIR" || exit 1
          exec "$APP_DIR/Zelda 3 Reborn.app/Contents/MacOS/zelda3-bin" "$@"
          EOF
          chmod +x "dist/$APP_NAME/Contents/MacOS/Zelda 3 Reborn"

          cat > "dist/$APP_NAME/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Zelda 3 Reborn</string>
            <key>CFBundleIdentifier</key>
            <string>com.github.xander-haj.z3r</string>
            <key>CFBundleName</key>
            <string>Zelda 3 Reborn</string>
            <key>CFBundleDisplayName</key>
            <string>Zelda 3 Reborn</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          dylibbundler -od -b -x "dist/$APP_NAME/Contents/MacOS/zelda3-bin" -d "dist/$APP_NAME/Contents/Frameworks"
          codesign --force --deep --sign - "dist/$APP_NAME"

          cp zelda3.ini readme.md LICENSE.txt dist/
          cd dist && zip -r "../zelda3-${{ github.ref_name }}-macos.zip" . && cd ..

          mkdir -p dmg
          cp -R "dist/$APP_NAME" dmg/
          cp zelda3.ini readme.md LICENSE.txt dmg/
          hdiutil create -volname "Zelda 3 Reborn ${{ github.ref_name }}" -srcfolder dmg -ov -format UDZO "zelda3-${{ github.ref_name }}-macos.dmg"
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            zelda3-${{ github.ref_name }}-macos.zip
            zelda3-${{ github.ref_name }}-macos.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-pkg-config
      - name: Build
        env:
          CFLAGS: "-O2 -std=gnu17"
        run: make -j$(nproc) zelda3
      - name: Package
        run: |
          mkdir -p dist
          cp zelda3.exe dist/
          cp zelda3.ini readme.md LICENSE.txt dist/
          cd dist && zip -r ../zelda3-${{ github.ref_name }}-windows-x64.zip .
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: zelda3-${{ github.ref_name }}-windows-x64.zip
